<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статья - Journal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-header">
    <div class="container site-header__inner">
        <a href="published.html" class="brand">
            <div class="brand-mark">JR</div>
            <span>Journal</span>
        </a>
        <nav class="nav-links">
            <a href="published.html" class="nav-link">Публикации</a>
            <a href="login.html" class="nav-link">Войти</a>
        </nav>
    </div>
</header>

<main class="article-layout">
    <div id="loadingState" class="panel empty-state">Загрузка статьи...</div>

    <section id="articleHero" class="panel article-cover" style="display:none;">
        <span class="topic-tag" id="articleTopic"></span>
        <h1 id="articleTitle"></h1>
        <div class="item-meta">Опубликовано · Автор: <span id="articleAuthor"></span></div>
    </section>

    <section id="articleContent" class="panel article-content" style="display:none;">
        <a href="published.html" class="nav-link" style="padding-left:0;">Назад к публикациям</a>
        <div class="article-text" id="articleText" style="margin-top:18px;"></div>
        <div class="author-card">
            <div class="author-avatar" id="authorAvatar"></div>
            <div>
                <div class="user-name" id="authorName"></div>
                <div class="user-role">Автор статьи</div>
            </div>
        </div>
    </section>

    <section id="errorState" class="panel empty-state" style="display:none;">
        <h3>Статья не найдена</h3>
        <p>Возможно, она ещё не опубликована или ссылка устарела.</p>
        <a href="published.html" class="btn btn-primary" style="margin-top:16px;">Вернуться к публикациям</a>
    </section>
</main>

<script src="js/api.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const articleId = params.get('id');

    async function loadArticle() {
        if (!articleId) {
            showError();
            return;
        }

        try {
            const article = await getPublishedArticle(articleId);

            document.title = article.title + ' - Journal';
            document.getElementById('articleTopic').textContent = article.topic || 'Без темы';
            document.getElementById('articleTitle').textContent = article.title;
            document.getElementById('articleAuthor').textContent = article.authorName;
            document.getElementById('articleText').textContent = article.content;
            document.getElementById('authorName').textContent = article.authorName;
            document.getElementById('authorAvatar').textContent = article.authorName[0].toUpperCase();

            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('articleHero').style.display = 'block';
            document.getElementById('articleContent').style.display = 'block';
        } catch (e) {
            showError();
        }
    }

    function showError() {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('errorState').style.display = 'block';
    }

    loadArticle();
</script>
</body>
</html>
