<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабинет рецензента - Journal</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="dashboard">
<header class="site-header">
    <div class="container site-header__inner">
        <a href="../published.html" class="brand">
            <div class="brand-mark">JR</div>
            <span>Journal</span>
        </a>
        <nav class="nav-links">
            <span class="nav-link">Пользователь: <strong id="userName"></strong></span>
            <button class="btn btn-secondary" onclick="logout()">Выйти</button>
        </nav>
    </div>
</header>

<div class="dashboard-shell">
    <aside class="panel sidebar-panel">
        <div class="user-card">
            <div class="user-avatar" id="avatarLetter"></div>
            <div class="user-name" id="sidebarName"></div>
            <div class="user-role">Рецензент</div>
        </div>

        <div class="menu">
            <button class="menu-item active">Мои статьи</button>
            <a href="../published.html" class="menu-item">Опубликованные статьи</a>
        </div>
    </aside>

    <main class="dashboard-main">
        <section class="panel notice-box" style="margin:0;">
            Слепое рецензирование: сведения об авторе скрыты, чтобы оценка оставалась нейтральной.
        </section>

        <section>
            <div class="section-title">Статьи на рецензии</div>
            <div class="section-subtitle">Оцените материал и выберите дальнейший шаг.</div>
            <div id="reviewList" class="list">
                <div class="panel empty-state">Загрузка...</div>
            </div>
        </section>
    </main>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
    requireAuth('REVIEWER');
    showUserName();

    const name = localStorage.getItem('name') || 'R';
    document.getElementById('sidebarName').textContent = name;
    document.getElementById('avatarLetter').textContent = name[0].toUpperCase();

    async function loadArticles() {
        const list = document.getElementById('reviewList');

        try {
            const articles = await getArticlesForReviewer();

            if (articles.length === 0) {
                list.innerHTML = '<div class="panel empty-state"><h3>Нет активных назначений</h3><p>Новые статьи появятся здесь после назначения.</p></div>';
                return;
            }

            list.innerHTML = articles.map(a => `
                <article class="panel list-item">
                    <span class="topic-tag">${a.topic || 'Без темы'}</span>
                    <div class="item-title">${a.title}</div>
                    <p class="item-text">${a.content}</p>

                    <div class="form-group" style="margin-top:18px;">
                        <label for="comment_${a.id}">Комментарий рецензента</label>
                        <textarea id="comment_${a.id}" placeholder="Опишите замечания и рекомендации"></textarea>
                    </div>

                    <div class="review-actions">
                        <button class="btn btn-success" onclick="handleVerdict(${a.id}, 'ACCEPTED')">Принять</button>
                        <button class="btn btn-warning" onclick="handleVerdict(${a.id}, 'REVISION')">На доработку</button>
                    </div>
                </article>
            `).join('');
        } catch (e) {
            list.innerHTML = '<div class="panel empty-state"><h3>Ошибка</h3><p>Не удалось загрузить статьи для рецензии.</p></div>';
        }
    }

    async function handleVerdict(articleId, verdict) {
        const comment = document.getElementById(`comment_${articleId}`).value;

        if (!comment.trim()) {
            alert('Добавьте комментарий перед отправкой решения.');
            return;
        }

        try {
            await submitReview(articleId, verdict, comment);
            loadArticles();
        } catch (e) {
            alert('Ошибка: ' + e.message);
        }
    }

    loadArticles();
</script>
</body>
</html>
