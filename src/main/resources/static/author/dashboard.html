<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабинет автора - Journal</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="dashboard">
<header class="site-header">
    <div class="container site-header__inner">
        <a href="../published.html" class="brand">
            <div class="brand-mark">JR</div>
            <span>Journal</span>
        </a>
        <nav class="nav-links">
            <span class="nav-link">Пользователь: <strong id="userName"></strong></span>
            <button class="btn btn-secondary" onclick="logout()">Выйти</button>
        </nav>
    </div>
</header>

<div class="dashboard-shell">
    <aside class="panel sidebar-panel">
        <div class="user-card">
            <div class="user-avatar" id="avatarLetter"></div>
            <div class="user-name" id="sidebarName"></div>
            <div class="user-role">Автор</div>
        </div>

        <div class="menu">
            <button class="menu-item active" id="btn-new" onclick="showSection('newArticle')">Новая статья</button>
            <button class="menu-item" id="btn-my" onclick="showSection('myArticles')">Мои статьи</button>
            <a href="../published.html" class="menu-item">Опубликованные статьи</a>
        </div>
    </aside>

    <main class="dashboard-main">
        <section id="newArticle" class="panel">
            <div class="section-title">Новая статья</div>
            <div class="section-subtitle">Короткая форма подачи без лишней перегрузки.</div>
            <div id="articleError" class="alert alert-error" style="display:none;"></div>
            <div id="articleSuccess" class="alert alert-success" style="display:none;"></div>

            <div class="form-group">
                <label for="title">Заголовок</label>
                <input type="text" id="title" placeholder="Введите заголовок статьи">
            </div>

            <div class="form-group">
                <label for="topic">Тема</label>
                <input type="text" id="topic" placeholder="Например: Technology, Science, Medicine">
            </div>

            <div class="form-group">
                <label for="content">Текст статьи</label>
                <textarea id="content" placeholder="Опишите материал статьи"></textarea>
            </div>

            <button class="btn btn-primary" onclick="handleCreateArticle()">Отправить на проверку</button>
        </section>

        <section id="myArticles" class="panel" style="display:none;">
            <div class="section-title">Мои статьи</div>
            <div class="section-subtitle">Текущий статус и возврат на доработку в одном списке.</div>
            <div id="articlesList" class="list">
                <div class="empty-state">Загрузка...</div>
            </div>
        </section>
    </main>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
    requireAuth('AUTHOR');
    showUserName();

    const name = localStorage.getItem('name') || 'A';
    document.getElementById('sidebarName').textContent = name;
    document.getElementById('avatarLetter').textContent = name[0].toUpperCase();

    function showSection(section) {
        document.getElementById('newArticle').style.display = 'none';
        document.getElementById('myArticles').style.display = 'none';
        document.getElementById('btn-new').classList.remove('active');
        document.getElementById('btn-my').classList.remove('active');

        document.getElementById(section).style.display = 'block';
        document.getElementById('btn-' + (section === 'newArticle' ? 'new' : 'my')).classList.add('active');

        if (section === 'myArticles') loadMyArticles();
    }

    async function handleCreateArticle() {
        const title = document.getElementById('title').value;
        const topic = document.getElementById('topic').value;
        const content = document.getElementById('content').value;
        const err = document.getElementById('articleError');
        const suc = document.getElementById('articleSuccess');

        err.style.display = 'none';
        suc.style.display = 'none';

        if (!title || !content) {
            err.textContent = 'Заполните заголовок и текст статьи';
            err.style.display = 'block';
            return;
        }

        try {
            await createArticle(title, topic, content);
            suc.textContent = 'Статья отправлена на проверку.';
            suc.style.display = 'block';
            document.getElementById('title').value = '';
            document.getElementById('topic').value = '';
            document.getElementById('content').value = '';
        } catch (e) {
            err.textContent = e.message;
            err.style.display = 'block';
        }
    }

    async function loadMyArticles() {
        const list = document.getElementById('articlesList');

        try {
            const articles = await getMyArticles();

            if (articles.length === 0) {
                list.innerHTML = '<div class="empty-state"><h3>Пока пусто</h3><p>У вас ещё нет отправленных статей.</p></div>';
                return;
            }

            list.innerHTML = articles.map(a => `
                <article class="panel list-item">
                    <div class="item-header">
                        <div>
                            <div class="item-title">${a.title}</div>
                            <div class="item-meta">Тема: ${a.topic || 'не указана'}</div>
                        </div>
                        <span class="badge ${getBadgeClass(a.status)}">${getStatusText(a.status)}</span>
                    </div>
                    <p class="item-text">${a.content.substring(0, 180)}...</p>
                    ${a.status === 'REVISION' ? `
                        <div class="revision-box">
                            <div class="item-meta" style="margin-bottom:10px;">Статья возвращена на доработку.</div>
                            <div class="form-group" style="margin-bottom:12px;">
                                <textarea id="revision_${a.id}" style="min-height:120px;">${a.content}</textarea>
                            </div>
                            <button class="btn btn-success" onclick="handleResubmit(${a.id})">Отправить доработку</button>
                        </div>
                    ` : ''}
                </article>
            `).join('');
        } catch (e) {
            list.innerHTML = '<div class="empty-state"><h3>Ошибка</h3><p>Не удалось загрузить список статей.</p></div>';
        }
    }

    async function handleResubmit(articleId) {
        const content = document.getElementById(`revision_${articleId}`).value;
        try {
            await resubmitArticle(articleId, content);
            alert('Доработка отправлена.');
            loadMyArticles();
        } catch (e) {
            alert('Ошибка: ' + e.message);
        }
    }

    function getBadgeClass(status) {
        const map = { 'PENDING': 'badge-pending', 'UNDER_REVIEW': 'badge-review', 'PUBLISHED': 'badge-published', 'REVISION': 'badge-revision' };
        return map[status] || 'badge-pending';
    }

    function getStatusText(status) {
        const map = { 'PENDING': 'Ожидает проверки', 'UNDER_REVIEW': 'На рецензии', 'PUBLISHED': 'Опубликована', 'REVISION': 'Доработка' };
        return map[status] || status;
    }
</script>
</body>
</html>
