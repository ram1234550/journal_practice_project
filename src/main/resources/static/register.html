<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Journal</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        .register-box {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .logo {
            text-align: center;
            font-size: 2rem;
            color: #e94560;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        h1 { text-align: center; color: #1a1a2e; margin-bottom: 0.3rem; }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .login-link {
            text-align: center;
            margin-top: 1.2rem;
            color: #666;
            font-size: 0.9rem;
        }

        .login-link a { color: #e94560; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div class="register-box">
    <div class="logo">📰 Journal</div>
    <h1>Регистрация</h1>
    <p class="subtitle">Создайте аккаунт автора</p>

    <div id="errorMsg" class="alert alert-error" style="display:none;"></div>
    <div id="successMsg" class="alert alert-success" style="display:none;"></div>

    <div class="form-group">
        <label>Имя</label>
        <input type="text" id="name" placeholder="Ваше имя">
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com">
    </div>

    <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>

    <button class="btn btn-primary" style="width:100%;" onclick="handleRegister()">
        Зарегистрироваться
    </button>

    <p class="login-link">
        Уже есть аккаунт? <a href="login.html">Войти</a>
    </p>
</div>

<script src="js/api.js"></script>
<script>
    async function handleRegister() {
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        if (!name || !email || !password) {
            errorMsg.textContent = 'Заполните все поля';
            errorMsg.style.display = 'block';
            return;
        }

        try {
            // Регистрация всегда как AUTHOR
            await register(name, email, password);
            successMsg.textContent = 'Аккаунт создан! Перенаправляем...';
            successMsg.style.display = 'block';
            setTimeout(() => window.location.href = 'login.html', 1500);
        } catch (e) {
            errorMsg.textContent = e.message;
            errorMsg.style.display = 'block';
        }
    }
</script>
</body>
</html>
