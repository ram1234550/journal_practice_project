<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Journal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-shell">
<div class="auth-card">
    <div class="auth-brand">
        <div class="brand-mark">JR</div>
        <div>
            <div class="user-name">Journal</div>
            <div class="user-role">Новый аккаунт автора</div>
        </div>
    </div>

    <h1 class="auth-title">Создание аккаунта</h1>
    <p class="auth-subtitle">Регистрация открывает доступ к подаче статьи и отслеживанию её статуса.</p>

    <div id="errorMsg" class="alert alert-error" style="display:none;"></div>
    <div id="successMsg" class="alert alert-success" style="display:none;"></div>

    <div class="form-group">
        <label for="name">Имя</label>
        <input type="text" id="name" placeholder="Ваше имя">
    </div>

    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="name@example.com">
    </div>

    <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" placeholder="Придумайте пароль">
    </div>

    <button class="btn btn-primary" style="width:100%;" onclick="handleRegister()">Зарегистрироваться</button>

    <div class="auth-footer">
        Уже есть аккаунт? <a href="login.html">Войти</a>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    async function handleRegister() {
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        if (!name || !email || !password) {
            errorMsg.textContent = 'Заполните все поля';
            errorMsg.style.display = 'block';
            return;
        }

        try {
            await register(name, email, password);
            successMsg.textContent = 'Аккаунт создан. Перенаправляем на вход...';
            successMsg.style.display = 'block';
            setTimeout(() => window.location.href = 'login.html', 1400);
        } catch (e) {
            errorMsg.textContent = e.message;
            errorMsg.style.display = 'block';
        }
    }
</script>
</body>
</html>
