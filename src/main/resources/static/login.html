<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Journal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-shell">
<div class="auth-card">
    <div class="auth-brand">
        <div class="brand-mark">JR</div>
        <div>
            <div class="user-name">Journal</div>
            <div class="user-role">Редакционная платформа</div>
        </div>
    </div>

    <h1 class="auth-title">Вход в систему</h1>
    <p class="auth-subtitle">Автор, рецензент, председатель и администратор работают в одном аккуратном потоке.</p>

    <div id="errorMsg" class="alert alert-error" style="display:none;"></div>

    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="name@example.com">
    </div>

    <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" placeholder="Введите пароль">
    </div>

    <button class="btn btn-primary" style="width:100%;" onclick="handleLogin()">Войти</button>

    <div class="auth-footer">
        Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');

        if (!email || !password) {
            errorMsg.textContent = 'Заполните все поля';
            errorMsg.style.display = 'block';
            return;
        }

        try {
            const data = await login(email, password);
            const roles = data.roles || [data.role];
            saveAuth(data.token, data.role, data.name, data.id, roles);

            if (roles.includes('ADMIN') || roles.includes('CHAIR')) window.location.href = 'admin/dashboard.html';
            else if (roles.includes('REVIEWER')) window.location.href = 'reviewer/dashboard.html';
            else window.location.href = 'author/dashboard.html';
        } catch (e) {
            errorMsg.textContent = e.message;
            errorMsg.style.display = 'block';
        }
    }

    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
    });
</script>
</body>
</html>
