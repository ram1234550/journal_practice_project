<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Публикации - Journal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-header">
    <div class="container site-header__inner">
        <a href="published.html" class="brand">
            <div class="brand-mark">JR</div>
            <span>Journal</span>
        </a>
        <nav class="nav-links">
            <a href="login.html" class="nav-link">Войти</a>
            <a href="register.html" class="btn btn-secondary">Регистрация</a>
        </nav>
    </div>
</header>

<main class="container">
    <section class="hero">
        <div class="hero-card">
            <h1>Опубликованные статьи</h1>
            <p>Каталог публикаций с быстрым фильтром по направлениям. Спокойный обзор без лишнего шума.</p>
        </div>
    </section>

    <section class="page-actions">
        <div>
            <div class="section-title" style="font-size:22px; margin-bottom:4px;">Каталог</div>
            <div class="section-subtitle" style="margin-bottom:0;">Выберите тему, чтобы сузить список.</div>
        </div>
        <select id="topicFilter" onchange="loadPublished()">
            <option value="">Все темы</option>
            <option value="Science">Наука</option>
            <option value="Sport">Спорт</option>
            <option value="Medicine">Медицина</option>
            <option value="Technology">Технологии</option>
        </select>
    </section>

    <section id="articlesList" class="article-grid">
        <div class="panel empty-state">Загрузка статей...</div>
    </section>
</main>

<script src="js/api.js"></script>
<script>
    function openArticle(id) {
        window.location.href = 'article.html?id=' + id;
    }

    async function loadPublished() {
        const list = document.getElementById('articlesList');
        const topic = document.getElementById('topicFilter').value;

        try {
            const articles = await getPublishedArticles(topic);

            if (articles.length === 0) {
                list.innerHTML = `
                    <div class="panel empty-state">
                        <h3>Ничего не найдено</h3>
                        <p>По выбранной теме пока нет опубликованных статей.</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = articles.map(a => `
                <article class="panel article-card" onclick="openArticle(${a.id})">
                    <span class="topic-tag">${a.topic || 'Без темы'}</span>
                    <div class="item-title">${a.title}</div>
                    <p class="item-text">${a.content.substring(0, 220)}...</p>
                    <div class="item-meta" style="margin-top:16px; display:flex; justify-content:space-between; gap:16px;">
                        <span>Автор: ${a.authorName}</span>
                        <span>Открыть статью</span>
                    </div>
                </article>
            `).join('');
        } catch (e) {
            list.innerHTML = '<div class="panel empty-state"><h3>Ошибка</h3><p>Не удалось загрузить публикации.</p></div>';
        }
    }

    loadPublished();
</script>
</body>
</html>
