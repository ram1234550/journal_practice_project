<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Опубликованные статьи — Journal</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .article-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 1.5rem;
            transition: transform 0.2s;
        }
        .article-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }
        .article-card h3 { color: #1a1a2e; font-size: 1.2rem; margin-bottom: 0.5rem; }
        .topic-tag {
            background: #fff0f3;
            color: #e94560;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 0.8rem;
        }
        .article-meta { color: #888; font-size: 0.85rem; margin-top: 0.8rem; }
        .hero {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            color: white;
            padding: 3rem 0;
            text-align: center;
            margin-bottom: 2rem;
        }
        .hero h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .hero p { color: #aaa; }
        .empty-state { text-align: center; padding: 4rem 2rem; color: #888; }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
        .filters { display: flex; justify-content: flex-end; margin-bottom: 1.2rem; }
        .filters select {
            max-width: 260px;
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #d9dce5;
            border-radius: 10px;
            font-size: 0.95rem;
            background: white;
        }
    </style>
</head>
<body>
<nav>
    <a href="#" class="logo">Journal</a>
    <div class="nav-links">
        <a href="login.html">Войти</a>
        <a href="register.html" class="btn btn-primary" style="padding: 0.4rem 1rem;">Регистрация</a>
    </div>
</nav>

<div class="hero">
    <h1>Опубликованные статьи</h1>
    <p>Фильтруйте публикации по тематике</p>
</div>

<div class="container">
    <div class="filters">
        <select id="topicFilter" onchange="loadPublished()">
            <option value="">Все темы</option>
            <option value="Science">Наука</option>
            <option value="Sport">Спорт</option>
            <option value="Medicine">Медицина</option>
            <option value="Technology">Технологии</option>
        </select>
    </div>
    <div id="articlesList">
        <p style="color:#888; text-align:center;">Загрузка статей...</p>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    function openArticle(id) {
        window.location.href = 'article.html?id=' + id;
    }

    async function loadPublished() {
        const list = document.getElementById('articlesList');
        const topic = document.getElementById('topicFilter').value;

        try {
            const articles = await getPublishedArticles(topic);

            if (articles.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📰</div>
                        <p>По выбранной теме пока нет опубликованных статей</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = articles.map(a => `
                <div class="article-card" onclick="openArticle(${a.id})" style="cursor:pointer;">
                    <span class="topic-tag">${a.topic || 'Без темы'}</span>
                    <h3>${a.title}</h3>
                    <p style="color:#555; line-height:1.7;">${a.content.substring(0, 200)}...</p>
                    <div class="article-meta" style="display:flex; justify-content:space-between; align-items:center;">
                        <span>Автор: ${a.authorName}</span>
                        <span style="color:#e94560; font-weight:600;">Читать далее →</span>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            list.innerHTML = '<p style="color:red; text-align:center;">Ошибка загрузки статей</p>';
        }
    }

    loadPublished();
</script>
</body>
</html>
