<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления - Journal</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="dashboard">
<header class="site-header">
    <div class="container site-header__inner">
        <a href="../published.html" class="brand">
            <div class="brand-mark">JR</div>
            <span>Journal</span>
        </a>
        <nav class="nav-links">
            <span class="nav-link">Пользователь: <strong id="userName"></strong></span>
            <button class="btn btn-secondary" onclick="logout()">Выйти</button>
        </nav>
    </div>
</header>

<div class="dashboard-shell">
    <aside class="panel sidebar-panel">
        <div class="user-card">
            <div class="user-avatar">AD</div>
            <div class="user-name" id="sidebarName"></div>
            <div class="user-role">Админ / Председатель</div>
        </div>

        <div class="menu">
            <button class="menu-item active" id="btn-pending" onclick="showSection('pending')">Входящие статьи</button>
            <a href="../published.html" class="menu-item">Опубликованные статьи</a>
        </div>
    </aside>

    <main class="dashboard-main">
        <section id="pending">
            <div class="section-title">Входящие статьи</div>
            <div class="section-subtitle">Назначение рецензентов и быстрый обзор редакционной очереди.</div>

            <div class="stats-grid">
                <div class="panel stat-card">
                    <div class="stat-label">Ожидают проверки</div>
                    <div class="stat-value" id="statPending">0</div>
                </div>
                <div class="panel stat-card">
                    <div class="stat-label">На рецензии</div>
                    <div class="stat-value" id="statReview">0</div>
                </div>
                <div class="panel stat-card">
                    <div class="stat-label">Опубликовано</div>
                    <div class="stat-value" id="statPublished">0</div>
                </div>
            </div>

            <div id="pendingList" class="list" style="margin-top:20px;">
                <div class="panel empty-state">Загрузка...</div>
            </div>
        </section>
    </main>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal-box">
        <div class="panel-title" style="font-size:22px; margin-bottom:8px;">Назначить рецензента</div>
        <div class="panel-subtitle" style="margin-bottom:18px;">Статья: <strong id="modalTitle"></strong></div>
        <div class="form-group">
            <label for="reviewerSelect">Рецензент</label>
            <select id="reviewerSelect"></select>
        </div>
        <div class="modal-actions">
            <button class="btn btn-primary" onclick="confirmAssign()">Назначить</button>
            <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
        </div>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
    requireAuth(['ADMIN', 'CHAIR']);
    showUserName();
    document.getElementById('sidebarName').textContent = localStorage.getItem('name') || 'Редактор';

    let currentArticleId = null;

    function showSection() {
        loadPendingArticles();
    }

    async function loadPendingArticles() {
        const list = document.getElementById('pendingList');
        try {
            const articles = await getPendingArticles();
            document.getElementById('statPending').textContent = articles.length;
            document.getElementById('statReview').textContent = 0;

            try {
                const published = await getPublishedArticles();
                document.getElementById('statPublished').textContent = published.length;
            } catch (e) {
                document.getElementById('statPublished').textContent = 0;
            }

            if (articles.length === 0) {
                list.innerHTML = '<div class="panel empty-state"><h3>Очередь пуста</h3><p>Все статьи обработаны.</p></div>';
                return;
            }

            list.innerHTML = articles.map(a => `
                <article class="panel list-item">
                    <div class="item-header">
                        <div>
                            <div class="item-title">${a.title}</div>
                            <div class="item-meta">Автор: ${a.authorName} · ${a.authorEmail}${a.topic ? ' · ' + a.topic : ''}</div>
                        </div>
                        <span class="badge badge-pending">Ожидает назначения</span>
                    </div>
                    <p class="item-text">${a.content.substring(0, 220)}...</p>
                    <div style="margin-top:18px;">
                        <button class="btn btn-primary" onclick="openModal(${a.id}, '${a.title.replace(/'/g, "\\'")}')">Назначить рецензента</button>
                    </div>
                </article>
            `).join('');
        } catch (e) {
            list.innerHTML = '<div class="panel empty-state"><h3>Ошибка</h3><p>Не удалось загрузить статьи.</p></div>';
        }
    }

    async function openModal(articleId, title) {
        currentArticleId = articleId;
        document.getElementById('modalTitle').textContent = title;
        const select = document.getElementById('reviewerSelect');
        select.innerHTML = '<option>Загрузка...</option>';

        try {
            const reviewers = await getReviewers();
            select.innerHTML = reviewers.map(r =>
                `<option value="${r.id}">${r.name} (${r.email})</option>`
            ).join('');
        } catch (e) {
            select.innerHTML = '<option>Ошибка загрузки</option>';
        }

        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        currentArticleId = null;
    }

    async function confirmAssign() {
        const reviewerId = document.getElementById('reviewerSelect').value;
        try {
            await assignReviewer(currentArticleId, reviewerId);
            closeModal();
            loadPendingArticles();
        } catch (e) {
            alert('Ошибка: ' + e.message);
        }
    }

    loadPendingArticles();
</script>
</body>
</html>
